# This file controls the behavior of Trunk: https://docs.trunk.io/cli
# To learn more about the format of this file, see https://docs.trunk.io/reference/trunk-yaml
version: 0.1
cli:
  version: 1.25.0
# Many linters and tools depend on runtimes - configure them here. (https://docs.trunk.io/runtimes)
runtimes:
  enabled:
    - go@1.21.0
    - java@13.0.11
    - node@22.16.0
    - python@3.10.8
# This is the section where you manage your linters. (https://docs.trunk.io/check/configuration)
lint:
  definitions:
    - name: mparticle-api-key-check
      files: [ALL]
      commands:
        - name: check-mparticle-keys
          output: pass_fail
          # ──────────────────────────────────────────────────────────────────────
          # Matches:
          #   us2-[32 hex chars]
          #   us1-...
          #   us-...
          #   eu1-...
          #   Any two lowercase letters + optional digits + hyphen + exactly 32 hex chars
          # ──────────────────────────────────────────────────────────────────────
          run: >-
            sh -c '
              if grep -E "(?i)[a-z]{2}[0-9]*-[0-9a-f]{32}" "${target}"; then
                echo "ERROR: Possible mParticle API key detected in ${target}"
                echo "       Format: xx...-[32 hex chars]  (e.g. us2-, eu1-, us-, au4-, etc.)"
                echo "API keys should never be committed to version control!"
                exit 1
              fi
            '
          success_codes: [0, 1]
  enabled:
    - actionlint@1.7.12
    - checkov@3.2.513
    - dotenv-linter@4.0.0
    - eslint@10.0.2
    - git-diff-check
    - ktlint@1.8.0
    - markdownlint@0.48.0
    - mparticle-api-key-check
    - osv-scanner@2.3.5
    - oxipng@10.1.0
    - prettier@3.8.1
    - shellcheck@0.11.0
    - shfmt@3.6.0
    - trivy@0.69.3
    - trufflehog@3.94.1
  disabled:
    - yamllint
  ignore:
    - linters: [ALL]
      paths:
        - Example/Pods
        - Example/Podfile.lock
        - RNExample/Gemfile.lock
        - RNExample/Gemfile
    - linters: [markdownlint]
      paths:
        - CHANGELOG.md # Standard changelog format violates MD001, MD024, MD025
actions:
  enabled:
    - trunk-announce
    - trunk-check-pre-push
    - trunk-check-pre-push-always
    - trunk-fmt-pre-commit
    - trunk-upgrade-available
plugins:
  sources:
    - id: trunk
      ref: v1.7.6
      uri: https://github.com/trunk-io/plugins

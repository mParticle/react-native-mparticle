# This file controls the behavior of Trunk: https://docs.trunk.io/cli
# To learn more about the format of this file, see https://docs.trunk.io/reference/trunk-yaml
version: 0.1
cli:
  version: 1.25.0
# Many linters and tools depend on runtimes - configure them here. (https://docs.trunk.io/runtimes)
runtimes:
  enabled:
    - go@1.19.5
    - java@13.0.11
    # markdownlint 0.48+ / string-width need Node 20+ (regex v flag)
    - node@20.18.0
    - python@3.10.8
# This is the section where you manage your linters. (https://docs.trunk.io/check/configuration)
lint:
  definitions:
    - name: mparticle-api-key-check
      files: [ALL]
      commands:
        - name: check-mparticle-keys
          output: pass_fail
          # ──────────────────────────────────────────────────────────────────────
          # Matches:
          #   us2-[32 hex chars]
          #   us1-...
          #   us-...
          #   eu1-...
          #   Any two lowercase letters + optional digits + hyphen + exactly 32 hex chars
          # ──────────────────────────────────────────────────────────────────────
          run: >-
            sh -c '
              if grep -E "(?i)[a-z]{2}[0-9]*-[0-9a-f]{32}" "${target}"; then
                echo "ERROR: Possible mParticle API key detected in ${target}"
                echo "       Format: xx...-[32 hex chars]  (e.g. us2-, eu1-, us-, au4-, etc.)"
                echo "API keys should never be committed to version control!"
                exit 1
              fi
            '
          success_codes: [0, 1]
  enabled:
    - actionlint@1.6.9
    - checkov@3.2.507
    - dotenv-linter@3.3.0
    # ESLint 9+ defaults to flat config only; this repo uses .eslintrc.js (ESLint 8 style).
    # Trunk runs ESLint in an isolated env without the repo's node_modules; bundle the same
    # plugins/parser as package.json so @typescript-eslint/* resolves (CI + local).
    - eslint@8.57.1:
        packages:
          - '@typescript-eslint/eslint-plugin@5.62.0'
          - '@typescript-eslint/parser@5.62.0'
          - 'eslint-config-prettier@8.10.0'
          - 'eslint-plugin-prettier@4.2.1'
    - git-diff-check
    - ktlint@0.43.2
    # 0.48+ pulls string-width that requires Node 20+ for regex /v; Trunk's runner uses Node 18.
    - markdownlint@0.39.0
    - mparticle-api-key-check
    - osv-scanner@1.3.6
    - oxipng@7.0.0
    - prettier@3.8.1
    - shellcheck@0.8.0
    - shfmt@3.6.0
    - trufflehog@3.31.3
  disabled:
    - yamllint
  ignore:
    - linters: [ALL]
      paths:
        - Example/Pods
        - Example/Podfile.lock
        - RNExample/Gemfile.lock
        - RNExample/Gemfile
    - linters: [markdownlint]
      paths:
        - CHANGELOG.md # Standard changelog format violates MD001, MD024, MD025
actions:
  enabled:
    - trunk-announce
    - trunk-check-pre-push
    - trunk-check-pre-push-always
    - trunk-fmt-pre-commit
    - trunk-upgrade-available
